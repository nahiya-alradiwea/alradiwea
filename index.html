<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة صوت المواطن - ناحية الرضوية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; }
        .bg-navy { background-color: #1a237e; }
        .bg-gold { background-color: #c5a021; }
        .hero-section {
            background: linear-gradient(rgba(26, 35, 126, 0.85), rgba(26, 35, 126, 0.85)), 
                        url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
        }
        /* تصميم رسالة النجاح */
        #successModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <!-- رسالة النجاح (تظهر بعد الإرسال) -->
    <div id="successModal">
        <div class="bg-white p-8 rounded-2xl max-w-sm w-full text-center shadow-2xl mx-4">
            <div class="text-green-500 text-6xl mb-4">✅</div>
            <h3 class="text-2xl font-bold text-navy mb-2">تم الإرسال بنجاح</h3>
            <p class="text-gray-600">تم إرسالها وسيتم التحقق من المعلومات المرسلة وحل المشكلة وبأسرع وقت.</p>
            <button onclick="closeModal()" class="mt-6 bg-navy text-white px-8 py-2 rounded-lg font-bold">إغلاق</button>
        </div>
    </div>

    <nav class="bg-white shadow-md border-b-4 border-gold p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-navy p-2 rounded-lg text-white font-bold">الرضوية</div>
                <h1 class="text-navy font-bold md:text-xl">مديرية ناحية الرضوية</h1>
            </div>
        </div>
    </nav>

    <header class="hero-section text-white py-12 px-4 text-center">
        <h2 class="text-3xl font-bold mb-2">منصة صوت المواطن</h2>
        <p class="opacity-90">«نستمع إليكم… لنخدمكم بشكل أفضل»</p>
    </header>

    <main class="max-w-3xl mx-auto -mt-10 mb-20 px-4">
        <div class="bg-white rounded-2xl shadow-xl p-6 md:p-10">
            <form id="complaintForm" class="space-y-5">
                
                <!-- الإرسال السري - تم إصلاح الحركة -->
                <div class="bg-blue-50 p-4 rounded-xl flex items-center justify-between border border-blue-100">
                    <span class="font-bold text-navy">إرسال الطلب بشكل سري؟</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="secretToggle" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-300 rounded-full peer peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:right-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gold"></div>
                    </label>
                </div>

                <div class="grid md:grid-cols-2 gap-4" id="personalInfo">
                    <input type="text" id="userName" placeholder="الاسم الكامل" class="w-full p-3 rounded-lg border focus:ring-2 focus:ring-navy outline-none">
                    <input type="tel" id="userPhone" placeholder="رقم الهاتف" class="w-full p-3 rounded-lg border focus:ring-2 focus:ring-navy outline-none">
                </div>

                <div class="grid md:grid-cols-2 gap-4">
                    <select id="requestType" class="w-full p-3 rounded-lg border outline-none">
                        <option>شكوى</option>
                        <option>ملاحظة</option>
                        <option>مقترح</option>
                    </select>
                    <button type="button" onclick="getLocation()" id="locBtn" class="bg-gray-100 p-3 rounded-lg border text-sm hover:bg-gray-200">
                       📍 تحديد موقع المشكلة
                    </button>
                    <input type="hidden" id="userLocation">
                </div>

                <input type="text" id="subject" placeholder="عنوان الموضوع" class="w-full p-3 rounded-lg border outline-none focus:border-navy" required>
                <textarea id="message" rows="4" placeholder="اكتب تفاصيل طلبك هنا..." class="w-full p-3 rounded-lg border outline-none focus:border-navy" required></textarea>

                <button type="submit" class="w-full bg-navy text-white py-4 rounded-xl font-bold text-xl hover:bg-blue-900 shadow-lg transition">
                    إرسال الملاحظة
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-gray-900 text-gray-500 py-6 text-center border-t-4 border-gold">
        <p>جميع الحقوق محفوظة © 2026 - مديرية ناحية الرضوية</p>
    </footer>

    <script>
        // إخفاء المعلومات الشخصية عند اختيار "سري"
        const secretToggle = document.getElementById('secretToggle');
        secretToggle.addEventListener('change', function() {
            const infoBox = document.getElementById('personalInfo');
            if(this.checked) {
                infoBox.style.opacity = '0.3';
                infoBox.querySelectorAll('input').forEach(i => i.disabled = true);
            } else {
                infoBox.style.opacity = '1';
                infoBox.querySelectorAll('input').forEach(i => i.disabled = false);
            }
        });

        // تحديد الموقع
        function getLocation() {
            const btn = document.getElementById('locBtn');
            if (navigator.geolocation) {
                btn.innerText = "جاري التحديد...";
                navigator.geolocation.getCurrentPosition(
                    (p) => {
                        document.getElementById('userLocation').value = `https://maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`;
                        btn.innerText = "✅ تم تحديد الموقع";
                        btn.className = "bg-green-100 text-green-700 p-3 rounded-lg border border-green-200 text-sm";
                    },
                    () => { btn.innerText = "❌ فشل تحديد الموقع"; }
                );
            }
        }

        // إرسال البيانات
        document.getElementById('complaintForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // بياناتك الخاصة (لن يراها المستخدم في الرسالة)
            const myNumber = "9647838022724"; 

            // تجميع البيانات
            const data = {
                secret: secretToggle.checked ? "نعم" : "لا",
                name: document.getElementById('userName').value || "مجهول",
                phone: document.getElementById('userPhone').value || "غير مسجل",
                type: document.getElementById('requestType').value,
                sub: document.getElementById('subject').value,
                msg: document.getElementById('message').value,
                loc: document.getElementById('userLocation').value || "لم يحدد"
            };

            // صياغة الرسالة للواتساب
            const text = `*بلاغ من المنصة*%0Aسري: ${data.secret}%0Aالاسم: ${data.name}%0Aالهاتف: ${data.phone}%0Aالنوع: ${data.type}%0Aالموضوع: ${data.sub}%0Aالتفاصيل: ${data.msg}%0Aالموقع: ${data.loc}`;

            // فتح الواتساب في نافذة مخفية أو صغيرة ثم إغلاقها فوراً لضمان الإرسال
            // ملاحظة: لإرسال صامت حقيقي 100% تحتاج سيرفر، لكن هذه الطريقة هي الأفضل لـ HTML
            const waUrl = `https://api.whatsapp.com/send?phone=${myNumber}&text=${text}`;
            
            // فتح الرابط في خلفية الصفحة
            const win = window.open(waUrl, '_blank');
            
            // إظهار رسالة الشكر للمواطن فوراً
            document.getElementById('successModal').style.display = 'flex';
            
            // إغلاق نافذة الواتساب بعد 5 ثوانٍ تلقائياً
            setTimeout(() => { if(win) win.close(); }, 500);
            
            this.reset();
        });

        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
        }
    </script>
</body>
</html>
